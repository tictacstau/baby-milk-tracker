<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blue background -->
  <rect width="100" height="100" rx="22" fill="#AFDAEB"/>

  <!-- Shield outline with gap at upper-right (large sparkle breaks through) -->
  <path d="M 52 13
    L 30 18
    Q 17 21 17 34
    L 17 56
    Q 20 70 50 82
    Q 80 70 83 56
    L 83 34
    Q 83 24 71 20
    L 64 16"
    fill="none" stroke="white" stroke-width="5.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Baby face circle -->
  <circle cx="50" cy="57" r="19" fill="white"/>

  <!-- Hair tuft -->
  <path d="M 46 38 Q 50 33 54 38"
    fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Left eye (happy closed arc) -->
  <path d="M 42 53 Q 44.5 50 47 53"
    fill="none" stroke="#6BAFC5" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right eye -->
  <path d="M 53 53 Q 55.5 50 58 53"
    fill="none" stroke="#6BAFC5" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M 43 62 Q 50 68 57 62"
    fill="none" stroke="#6BAFC5" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small sparkle inside shield -->
  <path d="M 55 22 L 56.5 26.5 L 61 28 L 56.5 29.5 L 55 34 L 53.5 29.5 L 49 28 L 53.5 26.5 Z"
    fill="white"/>

  <!-- Large sparkle outside shield upper-right -->
  <path d="M 75 10 L 77.5 17.5 L 85 20 L 77.5 22.5 L 75 30 L 72.5 22.5 L 65 20 L 72.5 17.5 Z"
    fill="white"/>
</svg>
