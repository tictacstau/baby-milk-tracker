<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Purple background -->
  <rect width="100" height="100" rx="20" fill="#5856D6"/>

  <!-- Shield -->
  <path d="M50 14
    C 50 14 24 20 20 23
    L 18 50
    C 18 67 30 80 50 89
    C 70 80 82 67 82 50
    L 80 23
    C 76 20 50 14 50 14 Z"
    fill="none" stroke="white" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Baby face (filled white circle) -->
  <circle cx="50" cy="53" r="17" fill="white"/>

  <!-- Eyes -->
  <circle cx="44.5" cy="50" r="2.2" fill="#5856D6"/>
  <circle cx="55.5" cy="50" r="2.2" fill="#5856D6"/>

  <!-- Smile -->
  <path d="M44 56 Q50 62 56 56" fill="none" stroke="#5856D6" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Hair tuft -->
  <path d="M47 36.5 Q50 31 53 36.5" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Large sparkle (upper right, outside shield) -->
  <path d="M73 17 L74.5 21.5 L79 23 L74.5 24.5 L73 29 L71.5 24.5 L67 23 L71.5 21.5 Z" fill="white"/>

  <!-- Small sparkle (right) -->
  <path d="M80 27 L81 29.5 L83.5 30.5 L81 31.5 L80 34 L79 31.5 L76.5 30.5 L79 29.5 Z" fill="white" opacity="0.85"/>

  <!-- Tiny sparkle inside shield top -->
  <path d="M63 25 L63.8 27 L65.8 27.8 L63.8 28.6 L63 30.6 L62.2 28.6 L60.2 27.8 L62.2 27 Z" fill="white" opacity="0.7"/>
</svg>
